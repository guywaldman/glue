version: 2

multi-ecosystem-groups:
  dependency-updates:
    schedule:
      interval: monthly

updates:
  - package-ecosystem: cargo
    directory: /glue
    patterns:
      - "*"
    multi-ecosystem-group: dependency-updates

  - package-ecosystem: npm
    directory: /extension
    patterns:
      - "*"
    multi-ecosystem-group: dependency-updates

  - package-ecosystem: github-actions
    directory: /
    patterns:
      - "*"
    multi-ecosystem-group: dependency-updates
