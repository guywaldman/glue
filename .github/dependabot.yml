version: 2
updates:
  - package-ecosystem: cargo
    directory: /glue
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      cargo-non-major:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /extension
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      npm-non-major:
        update-types:
          - minor
          - patch
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      github-actions-non-major:
        update-types:
          - minor
          - patch
        patterns:
          - "*"
