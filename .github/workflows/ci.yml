name: CI

on:
  push:
    branches: [main, dev]
    tags:
      - "v*"
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to (re)publish release assets for (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG}"
          version="${tag#v}"

          if [[ "$tag" == "$version" ]]; then
            echo "::error::Release tag must start with v, got '${tag}'."
            exit 1
          fi

          manifest_version=$(jq -r '."."' .release-please-manifest.json)
          cargo_version=$(sed -n 's/^version = "\(.*\)"/\1/p' glue/Cargo.toml | head -n 1)
          extension_version=$(jq -r '.version' extension/package.json)
          subject=$(git log -1 --pretty=%s)
          expected_subject="chore(main): release ${version}"

          if [ "$manifest_version" != "$version" ]; then
            echo "::error::.release-please-manifest.json is ${manifest_version}, expected ${version}."
            exit 1
          fi

          if [ "$cargo_version" != "$version" ]; then
            echo "::error::glue/Cargo.toml is ${cargo_version}, expected ${version}."
            exit 1
          fi

          if [ "$extension_version" != "$version" ]; then
            echo "::error::extension/package.json is ${extension_version}, expected ${version}."
            exit 1
          fi

          if [[ "$subject" != "$expected_subject" && "$subject" != "$expected_subject (#"* ]]; then
            echo "::error::Release tag ${tag} points at '${subject}', not a Release Please release commit for ${version}."
            exit 1
          fi

  pr-title:
    name: PR validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title follows Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test | ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            glue/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests
        run: cargo test --workspace --exclude cli
        working-directory: glue

      - name: Run CLI unit tests (skip E2E)
        run: cargo test -p cli --lib
        working-directory: glue

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            glue/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - uses: j178/prek-action@v1

  skill:
    name: Skill
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Validate repo-published Glue skill
        run: CI=true ./scripts/publish_glue_skill.sh --check

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            glue/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run E2E tests
        run: just test-e2e-cli
        working-directory: .

  perf-codegen-gate:
    name: Perf | Codegen regression gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      PERF_REGRESSION_THRESHOLD_PCT: "20"
      PERF_APPROVAL_LABEL: "perf-regression-approved"
      GLUE_BENCH_ITERATIONS: "10"
      GLUE_BENCH_WARMUPS: "3"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            glue/target
          key: ${{ runner.os }}-cargo-perf-${{ hashFiles('**/Cargo.lock') }}

      - name: Measure HEAD codegen perf
        run: |
          cd glue
          GLUE_BENCH_JSON_OUT="$RUNNER_TEMP/head_perf.json" cargo bench -p cli --bench codegen_perf

      - name: Check out PR base in worktree
        run: |
          git fetch --no-tags origin ${{ github.event.pull_request.base.sha }} --depth=1
          git worktree add "$RUNNER_TEMP/base_checkout" ${{ github.event.pull_request.base.sha }}

      - name: Measure baseline codegen perf
        run: |
          cd "$RUNNER_TEMP/base_checkout/glue"
          if [ ! -f "cli/benches/codegen_perf.rs" ] || ! grep -q 'name = "codegen_perf"' "cli/Cargo.toml"; then
            echo "WARNING: Base commit does not include cli/codegen_perf benchmark target; using HEAD results as temporary baseline."
            cp "$RUNNER_TEMP/head_perf.json" "$RUNNER_TEMP/base_perf.json"
          else
            GLUE_BENCH_JSON_OUT="$RUNNER_TEMP/base_perf.json" cargo bench -p cli --bench codegen_perf
          fi

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Compare perf and enforce approval gate
        run: |
          set -euo pipefail
          base_ms=$(jq -r '.median_ms' "$RUNNER_TEMP/base_perf.json")
          head_ms=$(jq -r '.median_ms' "$RUNNER_TEMP/head_perf.json")
          threshold_pct=${PERF_REGRESSION_THRESHOLD_PCT}
          regression_pct=$(awk -v h="$head_ms" -v b="$base_ms" 'BEGIN { if (b <= 0) { print "nan" } else { printf "%.6f", ((h-b)/b)*100 } }')

          if [ "$regression_pct" = "nan" ]; then
            echo "::error::Invalid baseline median_ms ($base_ms), cannot compare perf"
            exit 1
          fi

          echo "Base median: ${base_ms} ms"
          echo "Head median: ${head_ms} ms"
          echo "Regression: ${regression_pct}% (threshold ${threshold_pct}%)"

          within_threshold=$(awk -v r="$regression_pct" -v t="$threshold_pct" 'BEGIN { if (r <= t) print "yes"; else print "no" }')
          if [ "$within_threshold" = "yes" ]; then
            echo "Perf gate passed"
            exit 0
          fi

          has_approval=$(jq -r --arg label "$PERF_APPROVAL_LABEL" '(.pull_request.labels // []) | map(.name) | any(. == $label)' "$GITHUB_EVENT_PATH")
          if [ "$has_approval" = "true" ]; then
            echo "::warning::Perf regression above threshold, but '$PERF_APPROVAL_LABEL' label is present. Gate overridden."
            exit 0
          fi

          echo "::error::Codegen perf regression ${regression_pct}% exceeds ${threshold_pct}% without approval label '$PERF_APPROVAL_LABEL'."
          exit 1

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codegen-perf-results
          path: |
            ${{ runner.temp }}/base_perf.json
            ${{ runner.temp }}/head_perf.json
          if-no-files-found: ignore

      - name: Cleanup worktree
        if: always()
        run: git worktree remove "$RUNNER_TEMP/base_checkout" --force || true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      COVERAGE_THRESHOLD: "60"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            glue/target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Run tests with coverage
        run: just codecov
        working-directory: .

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: glue/lcov.info
          if-no-files-found: error

  extension-test:
    name: VS Code Extension Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            glue/target
          key: ${{ runner.os }}-cargo-ext-${{ hashFiles('**/Cargo.lock') }}

      - name: Install extension dependencies
        run: npm ci
        working-directory: extension

      - name: Build extension and LSP
        run: |
          npm run compile
          npm run build:lsp
        working-directory: extension

      - name: Run extension tests
        run: xvfb-run -a npm test
        working-directory: extension

  extension:
    name: VS Code extension | ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [test, lint, extension-test, coverage, skill, release-gate]
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            platform: win32-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm ci
          npm install -g @vscode/vsce
        working-directory: extension

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Build LSP
        run: cargo build --release --bin lsp --target ${{ matrix.target }}
        working-directory: glue
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Copy LSP binary to extension (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p out
          cp ../glue/target/${{ matrix.target }}/release/lsp out/lsp
          chmod +x out/lsp
        working-directory: extension

      - name: Copy LSP binary to extension (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out
          Copy-Item "../glue/target/${{ matrix.target }}/release/lsp.exe" -Destination "out/lsp.exe"
        working-directory: extension

      - name: Compile extension
        run: npm run compile
        working-directory: extension

      - name: Publish to VS Code Marketplace
        shell: bash
        run: |
          set +e
          publish_output=$(vsce publish --pat "${{ secrets.VS_CODE_EXTENSION_PUBLISH_PAT }}" --target "${{ matrix.platform }}" 2>&1)
          publish_status=$?
          set -e

          printf '%s\n' "$publish_output"

          if [ "$publish_status" -eq 0 ]; then
            exit 0
          fi

          # Marketplace packages are immutable per extension version and platform.
          # A retry after a partial release should skip only that known idempotency case.
          if grep -q "already exists" <<< "$publish_output"; then
            echo "Extension package for ${{ matrix.platform }} already exists; skipping publish."
            exit 0
          fi

          exit "$publish_status"
        working-directory: extension

  extension-vsix:
    name: VS Code VSIX | ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    needs: [test, lint, extension-test, coverage, skill, release-gate]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            platform: win32-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          npm ci
          npm install -g @vscode/vsce
        working-directory: extension

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Build LSP
        run: cargo build --release --bin lsp --target ${{ matrix.target }}
        working-directory: glue
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Copy LSP binary to extension (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p out
          cp ../glue/target/${{ matrix.target }}/release/lsp out/lsp
          chmod +x out/lsp
        working-directory: extension

      - name: Copy LSP binary to extension (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out
          Copy-Item "../glue/target/${{ matrix.target }}/release/lsp.exe" -Destination "out/lsp.exe"
        working-directory: extension

      - name: Compile extension
        run: npm run compile
        working-directory: extension

      - name: Package VSIX
        shell: bash
        run: |
          mkdir -p ../artifacts
          vsce package --target "${{ matrix.platform }}" --out "../artifacts/glue_${{ matrix.platform }}.vsix"
        working-directory: extension

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.platform }}
          path: artifacts/*.vsix
          if-no-files-found: error

  build-artifacts:
    name: Build | ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [test, lint, e2e-tests, coverage, skill, release-gate]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: glue_linux_amd64
            binary_extension: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: glue_linux_arm64
            binary_extension: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: glue_darwin_amd64
            binary_extension: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: glue_darwin_arm64
            binary_extension: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: glue_windows_amd64
            binary_extension: ".exe"
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: glue_windows_arm64
            binary_extension: ".exe"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            glue/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --workspace
        working-directory: glue
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare artifact directory
        shell: bash
        run: |
          mkdir -p artifacts
          cp glue/target/${{ matrix.target }}/release/glue${{ matrix.binary_extension }} artifacts/glue${{ matrix.binary_extension }}
          cp glue/target/${{ matrix.target }}/release/lang${{ matrix.binary_extension }} artifacts/lang${{ matrix.binary_extension }}
          cp glue/target/${{ matrix.target }}/release/lsp${{ matrix.binary_extension }} artifacts/lsp${{ matrix.binary_extension }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-artifacts, extension-vsix]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release assets
        shell: bash
        run: |
          mkdir -p dist

          # Binary artifacts: tar up only directories that contain a glue binary.
          for dir in artifacts/*/; do
            name="$(basename "$dir")"
            if [ -f "${dir}glue" ] || [ -f "${dir}glue.exe" ]; then
              tar -czvf "dist/${name}.tar.gz" -C "$dir" .
            fi
          done

          # VSIX artifacts: copy through as-is.
          find artifacts -maxdepth 3 -type f -name '*.vsix' -print -exec cp {} dist/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/*.tar.gz
            dist/*.vsix
            install.sh
            install.ps1
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: [create-release]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Validate Homebrew tap token
        shell: bash
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "::error::Missing HOMEBREW_TAP_TOKEN secret. Add a token with contents:write access to guywaldman/homebrew-tap."
            exit 1
          fi

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: guywaldman/homebrew-tap
          path: homebrew-tap
          token: ${{ env.HOMEBREW_TAP_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Update Glue formula
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..12}; do
            if just update-glue "$RELEASE_TAG"; then
              exit 0
            fi

            echo "Homebrew formula update failed for ${RELEASE_TAG}; retrying after release API/assets settle (${attempt}/12)."
            sleep 10
          done

          just update-glue "$RELEASE_TAG"
        working-directory: homebrew-tap

      - name: Commit and push formula update
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "Homebrew formula is already up to date for ${RELEASE_TAG}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/glue.rb
          git commit -m "chore(glue): update to ${RELEASE_TAG}"
          git push
