name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    concurrency:
      group: release-please-main
      cancel-in-progress: false
    env:
      RELEASE_PR_BRANCH: release-please--branches--main
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inspect release state
        id: release_state
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          set -euo pipefail

          echo "already_released=false" >> "$GITHUB_OUTPUT"

          version=$(jq -r '."."' .release-please-manifest.json)
          tag="v${version}"
          subject=$(git log -1 --pretty=%s)
          expected_subject="chore(main): release ${version}"

          if [[ "$subject" != "$expected_subject" && "$subject" != "$expected_subject (#"* ]]; then
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            git fetch --depth=1 origin "refs/tags/${tag}:refs/tags/${tag}"
            tag_sha=$(git rev-list -n 1 "$tag")
            head_sha=$(git rev-parse HEAD)

            if [ "$tag_sha" != "$head_sha" ]; then
              echo "::error::Release tag $tag exists, but it points to $tag_sha instead of this release commit $head_sha."
              exit 1
            fi
          fi

          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $tag already exists for this commit; skipping release-please."
            echo "already_released=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run release-please
        id: release
        if: ${{ steps.release_state.outputs.already_released != 'true' }}
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Check out release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_PR_BRANCH }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Sync Cargo.lock after version bump
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          cargo metadata --manifest-path glue/Cargo.toml --format-version 1 > /dev/null

          if git diff --quiet -- glue/Cargo.lock; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add glue/Cargo.lock
          git commit -m "chore: sync Cargo.lock"
          git push origin HEAD:"${RELEASE_PR_BRANCH}"
