name: Publish Glue Skill

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "scripts/publish_glue_skill.sh"
      - ".github/workflows/publish-skill.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish with GitHub agent skills (for example, v1.0.0)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish-glue-skill:
    name: Publish Glue skill
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Validate repo-published skill
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.tag == '' }}
        env:
          SKILLS_SH_INSTALL_SOURCE: https://github.com/guywaldman/glue
        run: CI=true ./scripts/publish_glue_skill.sh --check

      - name: Publish GitHub agent skill
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
        env:
          SKILLS_SH_INSTALL_SOURCE: https://github.com/guywaldman/glue
        run: |
          set -euo pipefail
          CI=true ./scripts/publish_glue_skill.sh --tag "${{ github.event.inputs.tag }}"
